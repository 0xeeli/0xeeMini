name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: |
          pip install -q \
            fastapi==0.111.0 \
            httpx==0.27.0 \
            loguru==0.7.2 \
            python-dotenv==1.0.1 \
            apscheduler==3.10.4 \
            psutil==5.9.8 \
            pytest==8.2.2 \
            pytest-asyncio==0.23.8 \
            anyio==4.4.0

      - name: Run tests
        run: pytest tests/ -v --tb=short
